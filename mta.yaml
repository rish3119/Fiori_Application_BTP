_schema-version: 3.3.0
ID: LearningPurpose
description: A simple CAP project.
version: 1.0.0
modules:
- name: LearningPurpose-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: LearningPurpose-db
  - name: uaa_LearningPurpose
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    disk-quota: 512M
    instances: 1
    memory: 256M
  build-parameters:
    builder: npm-ci
- name: LearningPurpose-db-deployer
  type: hdb
  path: db
  requires:
  - name: LearningPurpose-db
  parameters:
    buildpack: nodejs_buildpack
    disk-quota: 256M
    memory: 128M
- name: LearningPurpose-destination-content
  type: com.sap.application.content
  requires:
  - name: LearningPurpose-destination-service
    parameters:
      content-target: true
  - name: LearningPurpose_html_repo_host
    parameters:
      service-key:
        name: LearningPurpose_html_repo_host-key
  - name: uaa_LearningPurpose
    parameters:
      service-key:
        name: uaa_LearningPurpose-key
  parameters:
    content:
      instance:
        destinations:
        - Name: ApplicationRouter_LearningPurpose_html_repo_host
          ServiceInstanceName: LearningPurpose-html5-app-host-service
          ServiceKeyName: LearningPurpose_html_repo_host-key
          sap.cloud.service: ApplicationRouter
        - Authentication: OAuth2UserTokenExchange
          Name: ApplicationRouter_uaa_LearningPurpose
          ServiceInstanceName: LearningPurpose-xsuaa-service
          ServiceKeyName: uaa_LearningPurpose-key
          sap.cloud.service: ApplicationRouter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: LearningPurpose-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: LearningPurpose_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - learningpurposefioriapplearninhgpurposeapp.zip
      name: learningpurposefioriapplearninhgpurposeapp
      target-path: resources/
- name: learningpurposefioriapplearninhgpurposeapp
  type: html5
  path: app/learninhg_purpose_app
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: LearningPurpose-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: LearningPurpose-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: LearningPurpose-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: LearningPurpose_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: LearningPurpose-html5-app-host-service
    service-plan: app-host
- name: uaa_LearningPurpose
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: LearningPurpose-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-name: LearningPurpose-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
